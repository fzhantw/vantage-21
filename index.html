<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Vantage 21 | 掌握未來的魔術荷官</title>
    <meta name="description" content="翻轉傳統 21 點！在 Vantage 21 中，你不再是被動的賭徒，而是掌控全場的魔術師荷官。運用預知能力與心理博弈，在優雅的黑色電影氛圍中主宰牌局。">
    <meta name="author" content="詹致遠 (Yuan)">

    <!-- Open Graph -->
    <meta property="og:title" content="Vantage 21 - 莊家永勝的神祕賽局">
    <meta property="og:description" content="擁有透視未來的權力，你就是這場賭局的建築師。體驗最純粹的掌控感，讓閒家見證魔術般的勝率。">
    <meta property="og:image" content="https://fzhantw.github.io/vantage-21/Gemini_Generated_Image_y0hxrpy0hxrpy0hx.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fzhantw.github.io/vantage-21">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Vantage 21 | The House Always Wins">
    <meta name="twitter:description" content="成為那名優雅、神祕、看穿一切的掌控者。">
    <meta name="twitter:image" content="https://fzhantw.github.io/vantage-21/Gemini_Generated_Image_y0hxrpy0hxrpy0hx.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://fzhantw.github.io/vantage-21/Gemini_Generated_Image_y0hxrpy0hxrpy0hx.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>魔術師 21 點：掌控者</h1>
            <div id="game-status">點擊「開始新回合」展開魔法...</div>
        </header>

        <div class="main-area">
            <div class="magician-dashboard">
                <div class="deck-preview">
                    <h3>🔮 預視未來 (Next 3)</h3>
                    <div id="future-cards" class="cards-row"></div>
                </div>
                <div class="dealer-stash">
                    <h3>📦 扣下的牌 (Stash)</h3>
                    <div id="stash-cards" class="cards-row"></div>
                    <div id="stash-info" style="font-size: 0.8rem; color: #ffd700;">點擊一張扣下的牌，再點擊發牌給閒家或莊家</div>
                </div>
            </div>

            <div class="dealer-area">
                <h3>你的手牌 (莊家)</h3>
                <div id="dealer-cards" class="cards-row"></div>
                <div id="dealer-score">分數: 0</div>
                <div class="controls">
                    <button id="dealer-hit-btn" class="btn-action" disabled>莊家要牌</button>
                    <button id="dealer-stand-btn" class="btn-action" disabled>莊家停牌</button>
                    <button id="next-round-btn">開始新回合</button>
                </div>
            </div>

            <div class="players-grid">
                <!-- Player A -->
                <div class="player-box" id="player-0">
                    <h4>閒家 A</h4>
                    <div class="chips">籌碼: 10</div>
                    <div class="bet">注好: 0</div>
                    <div class="cards cards-row"></div>
                    <div id="player-0-status" class="player-action-hint">等待中...</div>
                    <div class="controls player-controls" style="display: none;">
                        <button class="btn-action give-btn">發牌給他</button>
                        <button class="btn-magician stash-btn">扣下此牌</button>
                    </div>
                </div>
                <!-- Player B -->
                <div class="player-box" id="player-1">
                    <h4>閒家 B</h4>
                    <div class="chips">籌碼: 10</div>
                    <div class="bet">注好: 0</div>
                    <div class="cards cards-row"></div>
                    <div id="player-1-status" class="player-action-hint">等待中...</div>
                    <div class="controls player-controls" style="display: none;">
                        <button class="btn-action give-btn">發牌給他</button>
                        <button class="btn-magician stash-btn">扣下此牌</button>
                    </div>
                </div>
                <!-- Player C -->
                <div class="player-box" id="player-2">
                    <h4>閒家 C</h4>
                    <div class="chips">籌碼: 10</div>
                    <div class="bet">注好: 0</div>
                    <div class="cards cards-row"></div>
                    <div id="player-2-status" class="player-action-hint">等待中...</div>
                    <div class="controls player-controls" style="display: none;">
                        <button class="btn-action give-btn">發牌給他</button>
                        <button class="btn-magician stash-btn">扣下此牌</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="magician-skills">
            <button id="lure-btn" class="btn-lure">💡 財迷心竅 (引誘下大注)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

    <link rel="icon" type="image/png" href="https://fzhantw.github.io/vantage-21/Gemini_Generated_Image_y0hxrpy0hxrpy0hx.png">

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

    <link rel="stylesheet" href="style.css">
    <style>
        html, body { margin: 0; padding: 0; background: #0a0606; overflow: hidden; width: 100%; height: 100%; }
        #root { width: 100%; height: 100%; }
        /* Keep original UI elements hidden but functional for bridge */
        .game-container, .fixed-top, .fixed-bottom-bar { display: none !important; }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YSNG52D593"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YSNG52D593');

<body>
    <div id="game-status" class="fixed-top">點擊「開始新回合」展開魔法...</div>

    <div class="game-container">
        <header>
            <h1>Vantage 21</h1>
        </header>

        <div class="main-area">
            <div class="magician-dashboard">
                <div class="deck-preview">
                    <h3>🔮 預視未來 (Next 3)</h3>
                    <div id="future-cards" class="cards-row"></div>
                </div>
                <div class="dealer-stash">
                    <h3>📦 扣下的牌 (Stash)</h3>
                    <div id="stash-cards" class="cards-row"></div>
                    <div id="stash-info" style="font-size: 0.8rem; color: #ffd700;">點擊選中扣下的牌</div>
                </div>
            </div>

            <div class="dealer-area">
                <h3>你的手牌 (莊家)</h3>
                <div id="dealer-cards" class="cards-row"></div>
                <div id="dealer-score">分數: 0</div>
            </div>

            <div class="players-grid">
                <!-- Player A -->
                <div class="player-box" id="player-0">
                    <h4>閒家 A</h4>
                    <div class="chips">籌碼: 10</div>
                    <div class="bet">注好: 0</div>
                    <div class="cards cards-row"></div>
                    <div id="player-0-status" class="player-action-hint">等待中...</div>
                </div>
                <!-- Player B -->
                <div class="player-box" id="player-1">
                    <h4>閒家 B</h4>
                    <div class="chips">籌碼: 10</div>
                    <div class="bet">注好: 0</div>
                    <div class="cards cards-row"></div>
                    <div id="player-1-status" class="player-action-hint">等待中...</div>
                </div>
                <!-- Player C -->
                <div class="player-box" id="player-2">
                    <h4>閒家 C</h4>
                    <div class="chips">籌碼: 10</div>
                    <div class="bet">注好: 0</div>
                    <div class="cards cards-row"></div>
                    <div id="player-2-status" class="player-action-hint">等待中...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed-bottom-bar">
        <div class="action-group" id="player-actions" style="display: none;">
            <button id="global-give-btn" class="btn-action">發牌給他</button>
            <button id="global-stash-btn" class="btn-magician">扣下此牌</button>
        </div>
        <div class="action-group" id="dealer-actions">
            <button id="dealer-hit-btn" class="btn-action" disabled>莊家要牌</button>
            <button id="dealer-stand-btn" class="btn-action" disabled>莊家停牌</button>
        </div>
        <div class="action-group">
            <button id="lure-btn" class="btn-lure">💡 財迷心竅</button>
            <button id="next-round-btn">開始新回合</button>
        </div>
    </div>
    <script src="script.js"></script>
    <div id="root"></div>
    <script type="text/babel" src="v21/shared.jsx"></script>
    <script type="text/babel" src="theatre-bridge.jsx"></script>
</body>
</html>
